<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pub Time</title>
  <meta name="description" content="How much daylight drinking time is there tonight?" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e8a022" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pub Time" />

  <script src="suncalc.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #e8a022;
      --amber-dark: #b37a10;
      --cream: #fdf6e3;
      --brown: #2c1a0e;
      --brown-mid: #5c3317;
      --foam: #f5edd6;
      --sky-top: #e8a022;
      --sky-bot: #8a3e0e;
    }

    html, body { height: 100%; }

    body {
      min-height: 100%;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 100%);
      background-attachment: fixed;
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
      transition: background 2s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.35;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
      position: relative;
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, var(--foam) 0%, var(--cream) 60%, #f0e5c8 100%);
      color: var(--brown);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow:
        0 2px 0 var(--amber),
        0 4px 0 var(--amber-dark),
        0 8px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.8);
      border-top: 3px solid var(--amber);
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pub-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--brown-mid);
      margin-bottom: 0.3rem;
      opacity: 0.7;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--brown);
      margin-bottom: 0.2rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--amber), transparent);
      margin: 1.5rem 0;
    }

    .glass-wrap { display: flex; justify-content: center; margin: 0.5rem 0 1.5rem; }
    .glass { width: 64px; height: 88px; }

    .big-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 15vw, 4.5rem);
      font-weight: 700;
      color: var(--brown);
      line-height: 1;
      letter-spacing: -0.02em;
      animation: pop 0.6s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .unit {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--brown-mid);
      letter-spacing: 0.1em;
      margin-top: 0.2rem;
    }

    .quip {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      color: var(--brown-mid);
      margin-top: 1.2rem;
      line-height: 1.5;
      border-left: 2px solid var(--amber);
      padding-left: 0.8rem;
    }

    .meta {
      margin-top: 1.8rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .meta-item {
      background: rgba(92, 51, 23, 0.06);
      border: 1px solid rgba(92, 51, 23, 0.12);
      border-radius: 3px;
      padding: 0.6rem 0.8rem;
    }

    .meta-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown-mid);
      opacity: 0.6;
      margin-bottom: 0.2rem;
    }

    .meta-value { font-size: 0.85rem; color: var(--brown); }

    .actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 130px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 0.9rem;
      border-radius: 3px;
      border: 1px solid var(--amber-dark);
      background: var(--amber);
      color: var(--brown);
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
    }
    .btn:hover { background: #f0b23a; }
    .btn:active { transform: translateY(1px); }
    .btn.secondary {
      background: transparent;
      color: var(--brown-mid);
      border-color: rgba(92, 51, 23, 0.25);
    }
    .btn.secondary:hover { background: rgba(92,51,23,0.06); }
    .btn[hidden] { display: none; }

    .loc-line {
      margin-top: 1rem;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown-mid);
      opacity: 0.55;
      text-align: center;
    }

    .pints {
      margin-top: 0.5rem;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown-mid);
      opacity: 0.55;
      text-align: center;
    }

    .state-closed { text-align: center; }
    .state-closed .big-number { font-size: clamp(2rem, 10vw, 3rem); color: var(--brown-mid); }

    .sun-arc { position: absolute; overflow: visible; pointer-events: none; }

    /* Guestbook */
    .guestbook {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      margin-top: 1.5rem;
      background: rgba(253, 246, 227, 0.92);
      border-radius: 4px;
      padding: 1.5rem 1.5rem 1rem;
      border-top: 3px solid var(--amber);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: rise 0.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .guestbook h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--brown);
      margin-bottom: 0.3rem;
    }
    .guestbook p {
      font-size: 0.72rem;
      color: var(--brown-mid);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .footer-note {
      position: relative;
      z-index: 1;
      margin-top: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(253, 246, 227, 0.7);
      text-align: center;
    }

    canvas#shareCanvas { display: none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" id="card">
      <svg class="sun-arc" viewBox="0 0 80 20" style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:80px;height:20px;">
        <circle cx="40" cy="10" r="6" fill="#e8a022"/>
        <line x1="40" y1="0" x2="40" y2="4" stroke="#e8a022" stroke-width="1.5"/>
        <line x1="52" y1="3" x2="49" y2="6" stroke="#e8a022" stroke-width="1.5"/>
        <line x1="28" y1="3" x2="31" y2="6" stroke="#e8a022" stroke-width="1.5"/>
      </svg>

      <div id="content">Loading...</div>

      <div class="actions">
        <button class="btn" id="shareBtn">📸 Share the verdict</button>
        <button class="btn secondary" id="locBtn">📍 Use my location</button>
        <button class="btn secondary" id="installBtn" hidden>⬇️ Install app</button>
      </div>

      <div class="loc-line" id="locLine">Showing: London, UK</div>
      <div class="pints" id="pints">🍺 pouring…</div>
    </div>

    <!-- Guestbook: pub recommendations via GitHub Discussions (giscus) -->
    <div class="guestbook">
      <h2>Leave a pub rec 🍻</h2>
      <p>Know a cracking spot for golden-hour pints? Sign in with GitHub and drop it below.</p>
      <div id="giscus-container">
        <!-- The giscus embed is injected by script once configured. See setup notes. -->
      <script src="https://giscus.app/client.js"
              data-repo="samuelwebb2/pub-time"
              data-repo-id="R_kgDORxPgXw"
              data-category="Announcements"
              data-category-id="DIC_kwDORxPgX84DA1Bp"
              data-mapping="pathname"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="bottom"
              data-theme="preferred_color_scheme"
              data-lang="en"
              crossorigin="anonymous"
              async>
      </script>
      </div>
    </div>

    <div class="footer-note">Made for London evenings · Works offline</div>
  </div>

  <canvas id="shareCanvas" width="1080" height="1080"></canvas>

  <script>
    /* ---------------- Config ---------------- */
    const LONDON = { lat: 51.5074, lng: -0.1278, tz: 'Europe/London', label: 'London, UK' };
    const PINTS_KEY = 'samuelwebb_pubtime_pints_v1'; // unique counter key
    const PINTS_URL = 'https://countapi.mileshilliard.com/api/v1/hit/' + PINTS_KEY;

    // Active location — starts as London, may be replaced by geolocation.
    let place = { ...LONDON };
    let lastWeather = null;

    /* ---------------- Weather ---------------- */
    const WMO_CODES = {
      0:{label:'Clear skies',icon:'☀️'},1:{label:'Mainly clear',icon:'🌤️'},
      2:{label:'Partly cloudy',icon:'⛅'},3:{label:'Overcast',icon:'☁️'},
      45:{label:'Foggy',icon:'🌫️'},48:{label:'Icy fog',icon:'🌫️'},
      51:{label:'Light drizzle',icon:'🌦️'},53:{label:'Drizzle',icon:'🌦️'},55:{label:'Heavy drizzle',icon:'🌧️'},
      61:{label:'Light rain',icon:'🌦️'},63:{label:'Rain',icon:'🌧️'},65:{label:'Heavy rain',icon:'🌧️'},
      71:{label:'Light snow',icon:'🌨️'},73:{label:'Snow',icon:'❄️'},75:{label:'Heavy snow',icon:'❄️'},
      80:{label:'Rain showers',icon:'🌦️'},81:{label:'Showers',icon:'🌧️'},82:{label:'Heavy showers',icon:'⛈️'},
      95:{label:'Thunderstorm',icon:'⛈️'},99:{label:'Thunderstorm',icon:'⛈️'}
    };
    const weatherInfo = (code) => WMO_CODES[code] || { label:'Variable', icon:'🌡️' };

    /* ---------------- Time helpers ---------------- */
    // If tz is null we use the device's local time; otherwise force that timezone.
    function fmtTime(date, tz) {
      const opts = { hour:'2-digit', minute:'2-digit' };
      if (tz) opts.timeZone = tz;
      return date.toLocaleTimeString('en-GB', opts);
    }
    function hm(date, tz) {
      const opts = { hour:'2-digit', minute:'2-digit', hour12:false };
      if (tz) opts.timeZone = tz;
      const [h,m] = date.toLocaleString('en-GB', opts).split(':').map(Number);
      return { h, m };
    }

    function getQuip(mins) {
      if (mins <= 0)  return "The sun's already called last orders. There's always tomorrow, champ.";
      if (mins < 30)  return "Barely time for a swift half. Drink fast, no dithering.";
      if (mins < 60)  return "One pint. Maybe two if you skip the crisps. No dawdling.";
      if (mins < 90)  return "A solid session window. Enough for a round or two and a bit of chat.";
      if (mins < 120) return "Now we're talking. That's a proper after-work. Pace yourself.";
      if (mins < 180) return "Luxurious. A long golden evening awaits. The garden's calling.";
      return "That's not pub time, that's a whole lifestyle. Sensational.";
    }

    /* ---------------- Golden-hour gradient ---------------- */
    function hexLerp(a, b, t) {
      const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
      const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
      const c = pa.map((v,i) => Math.round(v + (pb[i]-v)*t));
      return 'rgb(' + c.join(',') + ')';
    }
    function skyColors(pct, sunUp) {
      if (!sunUp) return ['#14102a', '#0d0a1a']; // night
      // stops from little-time (0) to lots-of-time (1)
      const stops = [
        { p:0.0,  top:'#3a1530', bot:'#1a0e20' },
        { p:0.35, top:'#c2410c', bot:'#5a1e2e' },
        { p:0.7,  top:'#e8a022', bot:'#8a3e0e' },
        { p:1.0,  top:'#f2c04a', bot:'#c26a12' }
      ];
      let lo = stops[0], hi = stops[stops.length-1];
      for (let i=0; i<stops.length-1; i++) {
        if (pct >= stops[i].p && pct <= stops[i+1].p) { lo = stops[i]; hi = stops[i+1]; break; }
      }
      const t = (pct - lo.p) / ((hi.p - lo.p) || 1);
      return [hexLerp(lo.top, hi.top, t), hexLerp(lo.bot, hi.bot, t)];
    }

    /* ---------------- Core compute ---------------- */
    function compute() {
      const now = new Date();
      const times = SunCalc.getTimes(now, place.lat, place.lng);
      const sunset = times.sunset;

      const nowHM = hm(now, place.tz);
      const sunHM = hm(sunset, place.tz);
      const pubOpenMins = 17*60 + 30;
      const nowMins = nowHM.h*60 + nowHM.m;
      const sunsetMins = sunHM.h*60 + sunHM.m;

      const startMins = Math.max(nowMins, pubOpenMins);
      const remaining = sunsetMins - startMins;

      return { now, sunset, nowMins, sunsetMins, pubOpenMins, remaining,
               isPubOpen: nowMins >= pubOpenMins, isSunUp: remaining > 0 };
    }

    /* ---------------- Render ---------------- */
    function render() {
      const s = compute();
      const hours = Math.floor(Math.abs(s.remaining)/60);
      const mins  = Math.abs(s.remaining) % 60;

      // gradient
      const pct = Math.min(1, Math.max(0, s.remaining/240));
      const [top, bot] = skyColors(pct, s.isSunUp);
      document.body.style.setProperty('--sky-top', top);
      document.body.style.setProperty('--sky-bot', bot);
      document.querySelector('meta[name="theme-color"]').setAttribute('content', top);

      const wi = lastWeather ? weatherInfo(lastWeather.code) : null;
      const wValue = lastWeather ? (wi.icon + ' ' + Math.round(lastWeather.temp) + '°C') : '—';
      const wLabel = lastWeather ? wi.label : 'Weather';

      let html = '';
      html += '<div class="pub-name">The Pub O\'Clock Calculator</div>';
      html += '<h1>Pub Time' + (s.isSunUp ? '' : ' is<br/>over') + '</h1>';
      html += '<div class="divider"></div>';

      if (!s.isSunUp) {
        html += '<div class="state-closed">';
        html += '<div class="glass-wrap"><svg viewBox="0 0 64 88" class="glass" xmlns="http://www.w3.org/2000/svg"><path d="M10 8 L6 80 Q6 84 10 84 L54 84 Q58 84 58 80 L54 8 Z" fill="none" stroke="#b37a10" stroke-width="2.5" stroke-linejoin="round"/></svg></div>';
        html += '<div class="big-number">Sun\'s down</div></div>';
        html += '<div class="quip">' + getQuip(-1) + '</div>';
      } else {
        const fill = Math.min(1, Math.max(0, s.remaining/240));
        html += '<div class="glass-wrap"><svg viewBox="0 0 64 88" class="glass" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">'
          + '<defs><clipPath id="glassClip"><path d="M10 8 L6 80 Q6 84 10 84 L54 84 Q58 84 58 80 L54 8 Z"/></clipPath>'
          + '<linearGradient id="beerGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5c842" stop-opacity="0.7"/><stop offset="100%" stop-color="#c07f10"/></linearGradient></defs>'
          + '<rect x="6" y="' + (88 - 80*fill) + '" width="52" height="' + (80*fill) + '" fill="url(#beerGrad)" clip-path="url(#glassClip)"/>'
          + '<ellipse cx="32" cy="' + (88 - 80*fill) + '" rx="23" ry="5" fill="#fffdf5" clip-path="url(#glassClip)" opacity="' + (fill>0.05?1:0) + '"/>'
          + '<path d="M10 8 L6 80 Q6 84 10 84 L54 84 Q58 84 58 80 L54 8 Z" fill="none" stroke="#b37a10" stroke-width="2.5" stroke-linejoin="round"/>'
          + '<path d="M58 30 Q74 30 74 44 Q74 58 58 58" fill="none" stroke="#b37a10" stroke-width="2.5"/></svg></div>';

        if (!s.isPubOpen) {
          const waitH = Math.floor((s.pubOpenMins - s.nowMins)/60);
          const waitM = (s.pubOpenMins - s.nowMins) % 60;
          html += '<div class="unit">pub opens in</div>';
          html += '<div class="big-number">' + (waitH>0 ? waitH+'h ' : '') + waitM + 'm</div>';
          html += '<div class="unit">then you\'ll have ' + hours + 'h ' + mins + 'm of golden time</div>';
        } else {
          html += '<div class="big-number">' + (hours>0 ? hours+'h ' : '') + mins + 'm</div>';
          html += '<div class="unit">of daylight drinking time</div>';
        }

        html += '<div class="quip">' + getQuip(s.remaining) + '</div>';
        html += '<div class="meta">'
          + '<div class="meta-item"><div class="meta-label">Pub opens</div><div class="meta-value">17:30</div></div>'
          + '<div class="meta-item"><div class="meta-label">Sunset</div><div class="meta-value">' + fmtTime(s.sunset, place.tz) + '</div></div>'
          + '<div class="meta-item"><div class="meta-label">Right now</div><div class="meta-value">' + fmtTime(s.now, place.tz) + '</div></div>'
          + '<div class="meta-item"><div class="meta-label">' + wLabel + '</div><div class="meta-value">' + wValue + '</div></div>'
          + '</div>';
      }

      document.getElementById('content').innerHTML = html;
    }

    /* ---------------- Weather fetch ---------------- */
    async function fetchWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + place.lat +
                    '&longitude=' + place.lng + '&current=temperature_2m,weathercode&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        lastWeather = { temp: data.current.temperature_2m, code: data.current.weathercode };
      } catch (e) { lastWeather = null; }
      render();
    }

    /* ---------------- Geolocation ---------------- */
    function useMyLocation() {
      if (!navigator.geolocation) return;
      document.getElementById('locLine').textContent = 'Finding you…';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          place = { lat: pos.coords.latitude, lng: pos.coords.longitude, tz: null, label: 'Your location' };
          document.getElementById('locLine').textContent = 'Showing: your location';
          render();
          fetchWeather();
        },
        () => {
          document.getElementById('locLine').textContent = 'Showing: London, UK (location denied)';
        },
        { timeout: 8000 }
      );
    }

    /* ---------------- Share image ---------------- */
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function drawShareImage() {
      const s = compute();
      const hours = Math.floor(Math.abs(s.remaining)/60);
      const mins  = Math.abs(s.remaining) % 60;
      const canvas = document.getElementById('shareCanvas');
      const ctx = canvas.getContext('2d');
      const W = 1080, H = 1080;

      const [top, bot] = skyColors(Math.min(1,Math.max(0,s.remaining/240)), s.isSunUp);
      let g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, top); g.addColorStop(1, bot);
      ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

      // card
      const cx=90, cy=140, cw=W-180, ch=H-280;
      ctx.fillStyle = '#fdf6e3';
      roundRect(ctx, cx, cy, cw, ch, 24); ctx.fill();
      ctx.fillStyle = '#e8a022';
      roundRect(ctx, cx, cy, cw, 12, 6); ctx.fill();

      ctx.textAlign = 'center';
      ctx.fillStyle = '#5c3317';
      ctx.font = '28px "DM Mono", monospace';
      ctx.fillText("THE PUB O'CLOCK CALCULATOR", W/2, cy+90);

      ctx.fillStyle = '#2c1a0e';
      ctx.font = 'bold 90px "Playfair Display", serif';
      ctx.fillText(s.isSunUp ? 'Pub Time' : 'Pub Time is over', W/2, cy+190);

      const bigText = !s.isSunUp ? "Sun's down"
        : (!s.isPubOpen ? 'Opens ' + (Math.floor((s.pubOpenMins-s.nowMins)/60)>0 ? Math.floor((s.pubOpenMins-s.nowMins)/60)+'h ' : '') + ((s.pubOpenMins-s.nowMins)%60) + 'm'
        : (hours>0 ? hours+'h ' : '') + mins + 'm');
      ctx.fillStyle = '#2c1a0e';
      ctx.font = 'bold 150px "Playfair Display", serif';
      ctx.fillText(bigText, W/2, cy+380);

      ctx.fillStyle = '#5c3317';
      ctx.font = '30px "DM Mono", monospace';
      ctx.fillText(s.isSunUp && s.isPubOpen ? 'of daylight drinking time' : '', W/2, cy+440);

      // quip (wrapped)
      ctx.font = 'italic 40px "Playfair Display", serif';
      ctx.fillStyle = '#5c3317';
      const quip = getQuip(s.isSunUp ? s.remaining : -1);
      const words = quip.split(' ');
      let line = '', yy = cy+540; const maxW = cw-120;
      for (const w of words) {
        const test = line + w + ' ';
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line.trim(), W/2, yy); line = w + ' '; yy += 54;
        } else line = test;
      }
      ctx.fillText(line.trim(), W/2, yy);

      // weather + sunset footer
      ctx.font = '30px "DM Mono", monospace';
      ctx.fillStyle = '#2c1a0e';
      const wi = lastWeather ? weatherInfo(lastWeather.code) : null;
      const wStr = lastWeather ? (wi.icon + ' ' + Math.round(lastWeather.temp) + '°C · ' + wi.label) : '';
      ctx.fillText('Sunset ' + fmtTime(s.sunset, place.tz) + (wStr ? '   ' + wStr : ''), W/2, cy+ch-70);

      ctx.fillStyle = 'rgba(253,246,227,0.85)';
      ctx.font = '26px "DM Mono", monospace';
      ctx.fillText('pubtime · ' + place.label, W/2, H-70);

      return new Promise((res) => canvas.toBlob(res, 'image/png'));
    }

    async function shareVerdict() {
      const blob = await drawShareImage();
      if (!blob) return;
      const file = new File([blob], 'pub-time.png', { type: 'image/png' });
      const s = compute();
      const mins = Math.abs(s.remaining);
      const text = s.isSunUp
        ? Math.floor(mins/60) + 'h ' + (mins%60) + 'm of pub time tonight 🍺'
        : "Pub time's over for today 🌑";
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], text }); return; } catch (e) {}
      }
      // fallback: download
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'pub-time.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    /* ---------------- Pints counter ---------------- */
    async function pourPint() {
      const el = document.getElementById('pints');
      try {
        const res = await fetch(PINTS_URL);
        const data = await res.json();
        const n = parseInt(data.value, 10);
        el.textContent = '🍺 ' + n.toLocaleString('en-GB') + ' pints poured here';
      } catch (e) {
        el.textContent = '';
      }
    }

    /* ---------------- PWA install ---------------- */
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').hidden = false;
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBtn').hidden = true;
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    /* ---------------- Wire up ---------------- */
    document.getElementById('shareBtn').addEventListener('click', shareVerdict);
    document.getElementById('locBtn').addEventListener('click', useMyLocation);

    render();          // instant paint (London, no weather)
    fetchWeather();    // weather for London, re-render
    pourPint();        // increment + show tally
    // Auto-refresh the countdown every 30s so it stays live
    setInterval(render, 30000);
  </script>
</body>
</html>
